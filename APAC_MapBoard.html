<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APAC: Balance of Power — 地圖遊戲板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;
  --border:rgba(255,255,255,0.08);
  --text:#c8cad4;--dim:#5a6070;
  --blue:#3a7bd5;--red:#c94040;--gold:#c9a84c;
  --mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:16px;}
h1{font-family:var(--mono);font-size:18px;font-weight:700;color:#e8e0cc;letter-spacing:-0.5px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.badge{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--dim);border:1px solid var(--border);padding:3px 10px;border-radius:2px;}
.layout{display:grid;grid-template-columns:1fr 260px;gap:12px;}
.map-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.map-wrap svg{width:100%;display:block;}
.sidebar{display:flex;flex-direction:column;gap:10px;}
.faction-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;}
.faction-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;text-transform:uppercase;}
.faction-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.faction-row:last-child{border-bottom:none;}
.faction-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.faction-name{font-size:13px;flex:1;}
.faction-count{font-family:var(--mono);font-size:16px;font-weight:700;}
.fc-blue .faction-count{color:var(--blue);}
.fc-red  .faction-count{color:var(--red);}
.fc-gold .faction-count{color:var(--gold);}
.fc-neut .faction-count{color:var(--dim);}
.info-panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;flex:1;}
.info-empty{color:var(--dim);font-size:13px;text-align:center;padding:30px 0;}
.info-faction{font-family:var(--mono);font-size:9px;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
.info-name{font-size:18px;font-weight:500;color:#e8e0cc;margin-bottom:4px;}
.info-en{font-family:var(--mono);font-size:11px;color:var(--dim);margin-bottom:12px;}
.bonus-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.bonus-item{display:flex;align-items:center;gap:8px;font-size:13px;}
.bonus-icon{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.b-eco{background:rgba(91,171,124,0.15);color:#5bab7c;}
.b-mil{background:rgba(201,64,64,0.15);color:#c94040;}
.b-dip{background:rgba(58,123,213,0.15);color:#3a7bd5;}
.b-soc{background:rgba(155,115,204,0.15);color:#9b73cc;}
.info-desc{font-size:12px;color:var(--dim);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;}
.ctrl-btn{width:100%;margin-top:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px;cursor:pointer;transition:background 0.15s;}
.ctrl-btn:hover{background:rgba(255,255,255,0.08);}
.legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-top:10px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--dim);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.help-text{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:8px;}
@media(max-width:700px){.layout{grid-template-columns:1fr;}}
</style>
</head>

    name:'太平洋島鏈', en:'Pacific Island Chain',
    bonuses:[{type:'mil',label:'軍事','val':'+5 / 回合'}],
    desc:'美中爭奪的最新前線。從關島到索羅門群島，小島國家的港口使用權決定了太平洋的制海能力。近年中國積極介入索羅門群島。',
    geo:'密克羅尼西亞、美拉尼西亞島群',
    faction:'neutral'
  }
};

const factionCfg = {
  blue: {label:'自由陣營控制',color:'var(--blue)',stroke:'#3a7bd5'},
  red:  {label:'東方陣營控制',color:'var(--red)', stroke:'#c94040'},
  gold: {label:'中立陣營控制',color:'var(--gold)',stroke:'#c9a84c'},
  neutral:{label:'未控制（中立）',color:'#5a6070',stroke:'#888780'}
};
const factionCycle = ['blue','red','gold','neutral'];
const bonusIcons = {eco:'$',mil:'⚔',dip:'◇',soc:'♦'};
const bonusClass = {eco:'b-eco',mil:'b-mil',dip:'b-dip',soc:'b-soc'};

let selected = null;

function updateCounts(){
  const counts = {blue:0,red:0,gold:0,neutral:0};
  Object.values(nodeData).forEach(n=>counts[n.faction]++);
  document.getElementById('count-blue').textContent=counts.blue;
  document.getElementById('count-red').textContent=counts.red;
  document.getElementById('count-gold').textContent=counts.gold;
  document.getElementById('count-neut').textContent=counts.neutral;
}

function applyFaction(id, faction){
  const cfg = factionCfg[faction];
  const g = document.getElementById(id);
  g.querySelector('.node-ring').setAttribute('stroke', cfg.stroke);
  g.querySelector('.node-ring').setAttribute('stroke-width', faction==='neutral'?'1.5':'2');
  g.querySelector('.node-fill').setAttribute('fill', faction==='neutral'?'#3a4050':cfg.stroke);
  g.querySelector('.node-fill').setAttribute('opacity', faction==='neutral'?'1':'0.7');
}

function renderInfo(id){
  const d = nodeData[id];
  const fc = factionCfg[d.faction];
  const bonusHtml = d.bonuses.map(b=>`
    <div class="bonus-item">
      <div class="bonus-icon ${bonusClass[b.type]}">${bonusIcons[b.type]}</div>
      <span style="color:var(--text)">${b.label}</span>
      <span style="margin-left:auto;font-family:var(--mono);font-size:12px;color:#5bab7c;font-weight:700">${b.val}</span>
    </div>`).join('');
  document.getElementById('info-content').innerHTML=`
    <div class="info-faction" style="color:${fc.color}">${fc.label}</div>
    <div class="info-name">${d.name}</div>
    <div class="info-en">${d.en}</div>
    <div class="bonus-list">${bonusHtml}</div>
    <div class="info-desc">
      <div style="font-size:10px;color:var(--dim);margin-bottom:6px;font-family:var(--mono)">REGION: ${d.geo}</div>
      ${d.desc}
    </div>
    <button class="ctrl-btn" onclick="cycleControl('${id}')">切換控制陣營 →</button>
  `;
}

function cycleControl(id){
  const d = nodeData[id];
  const idx = factionCycle.indexOf(d.faction);
  d.faction = factionCycle[(idx+1)%4];
  applyFaction(id, d.faction);
  updateCounts();
  renderInfo(id);
}

document.querySelectorAll('.map-node').forEach(g=>{
  g.style.cursor='pointer';
  g.addEventListener('click',()=>{
    const id=g.id;
    document.querySelectorAll('.map-node .node-ring').forEach(r=>{
      const curStroke = r.getAttribute('stroke');
      r.setAttribute('stroke-opacity','1');
    });
    selected=id;
    renderInfo(id);
  });
});

updateCounts();
</script>
</body>
</html>
