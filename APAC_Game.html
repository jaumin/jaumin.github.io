<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APAC: Balance of Power</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap');
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--bg4:#0f1219;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#c8cad4;--dim:#5a6070;--accent:#e8e0cc;
  --blue:#3a7bd5;--red:#c94040;--gold:#c9a84c;
  --green:#5bab7c;--purple:#9b73cc;
  --mono:'Space Mono',monospace;--sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}
/* HEADER */
.hdr{background:var(--bg4);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.rnd{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap}
.ten-wrap{flex:1;display:flex;align-items:center;gap:8px;min-width:180px}
.ten-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);white-space:nowrap}
.ten-bar{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.ten-fill{height:100%;border-radius:3px;transition:width .5s,background .5s}
.ten-val{font-family:var(--mono);font-size:10px;font-weight:700;min-width:16px}
.act-badge{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:2px;border:1px solid;white-space:nowrap}
/* MAIN GRID */
.main{flex:1;display:grid;grid-template-columns:260px 1fr 220px;gap:0;overflow:hidden}
/* MAP */
.map-col{border-right:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;background:var(--bg4)}
.map-col svg{flex:1;width:100%}
/* CENTER */
.center-col{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
/* STATS */
.stats-col{border-left:1px solid var(--border);overflow-y:auto;padding:8px}
/* FACTION STAT CARD */
.fsc{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;border-top:2px solid;margin-bottom:8px}
.fsc-name{font-family:var(--mono);font-size:9px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border);font-size:11px}
.stat-row:last-of-type{border-bottom:none}
.stat-lbl{color:var(--dim)}
.stat-v{font-family:var(--mono);font-weight:700;font-size:12px}
.soc-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:5px;overflow:hidden}
.soc-fill{height:100%;background:var(--purple);transition:width .4s}
.node-mini{display:flex;flex-wrap:wrap;gap:2px;margin-top:6px}
.ntag{font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:2px;border:1px solid}
/* PHASE TITLE */
.ptitle{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
/* CARDS */
.cards-row{display:flex;gap:8px;flex-wrap:wrap}
.gcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px;width:148px;cursor:pointer;transition:border-color .15s,transform .1s;flex-shrink:0;position:relative}
.gcard:hover{border-color:var(--border2);transform:translateY(-2px)}
.gcard.sel{border-width:1.5px}
.gcard.played{opacity:.4;cursor:default;transform:none}
.ctag{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.cname{font-size:12px;font-weight:500;color:var(--accent);line-height:1.3;margin-bottom:6px}
.ceff{font-family:var(--mono);font-size:9px;color:var(--green);margin-bottom:2px}
.ceff.neg{color:#d97070}
.cflv{font-size:9px;color:var(--dim);font-style:italic;border-top:1px solid var(--border);padding-top:5px;margin-top:5px;line-height:1.4}
/* BUTTONS */
.btn{font-family:var(--mono);font-size:10px;padding:7px 12px;border-radius:3px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;transition:background .15s}
.btn:hover:not(:disabled){background:rgba(255,255,255,.08)}
.btn:disabled{opacity:.3;cursor:default}
.btn-b{border-color:var(--blue);color:var(--blue)}
.btn-b:hover:not(:disabled){background:rgba(58,123,213,.1)}
.btn-g{border-color:var(--gold);color:var(--gold)}
.btn-g:hover:not(:disabled){background:rgba(201,168,76,.1)}
.btn-r{border-color:var(--red);color:var(--red)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}
/* DICE */
.dice-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:14px;text-align:center}
.dface{font-size:44px;display:block;transition:all .1s}
.dmult{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--gold);margin-top:6px}
/* EFFECT LOG */
.elog{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px}
.el-plus{color:var(--green)}.el-minus{color:#d97070}
/* ACTIONS */
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.abtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px;cursor:pointer;text-align:left;transition:border-color .15s,background .15s}
.abtn:hover:not([disabled]){border-color:var(--border2);background:rgba(255,255,255,.02)}
.abtn[disabled]{opacity:.3;cursor:default;pointer-events:none}
.atitle{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--gold);margin-bottom:3px}
.acost{font-family:var(--mono);font-size:8px;color:var(--dim);margin-bottom:3px}
.adesc{font-size:10px;color:var(--dim);line-height:1.4}
/* LOG */
.glog{background:var(--bg3);border-radius:4px;border:1px solid var(--border);padding:8px;max-height:100px;overflow-y:auto;font-size:10px;font-family:var(--mono);color:var(--dim)}
.le{padding:2px 0;border-bottom:1px solid var(--border)}
.le:last-child{border-bottom:none}
/* SELECT */
select{background:var(--bg2);color:var(--text);border:1px solid var(--border2);padding:6px;border-radius:3px;width:100%;font-family:var(--mono);font-size:10px;margin-top:6px}
/* BADGES */
.sbadge{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:2px}
.sb-col{background:rgba(201,64,64,.15);color:#d97070;border:1px solid rgba(201,64,64,.3)}
.sb-war{background:rgba(201,64,64,.12);color:#c94040;border:1px solid rgba(201,64,64,.2)}
.sb-tr{background:rgba(91,171,124,.1);color:var(--green);border:1px solid rgba(91,171,124,.25)}
/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
/* DIVIDER */
.div-lbl{font-family:var(--mono);font-size:9px;color:var(--dim);margin:10px 0 6px;letter-spacing:1px;text-transform:uppercase}
/* VICTORY */
.victory{padding:40px;max-width:600px;margin:0 auto;text-align:center}
.v-title{font-family:var(--mono);font-size:24px;font-weight:700;margin-bottom:8px}
.v-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:24px 0}
.v-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;border-top:2px solid}
/* CRISIS FLASH */
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
.crisis-flash{animation:flash .4s linear 3}
/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

// ═══ STATE ═══
let G;
const DECKS={blue:{pm:BLUE_PM,dm:BLUE_DM},red:{pm:RED_PM,dm:RED_DM},gold:{pm:GOLD_PM,dm:GOLD_DM}};

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function getDiceMult(r){return r<=2?1:r<=4?2:r===5?3:4}
function fc(id){return id==='blue'?'#3a7bd5':id==='red'?'#c94040':'#c9a84c'}
function fn(id){if(!id)return '未控制';return G?.factions[id]?.name||id}
function activeFid(){return G.order[G.turnIdx]}
function activeF(){return G.factions[activeFid()]}
function stat_lbl(s){return {eco:'💰',mil:'⚔',dip:'🤝',soc:'🏛'}[s]||s}

function initGame(){
  G={
    round:1,maxRounds:20,order:['blue','red','gold'],turnIdx:0,
    phase:'select',tension:2,crisisTimer:3,
    winner:null,ending:null,log:[],
    pendingEffects:[],actionDone:false,selAction:null,
    selPM:null,selDM:null,diceRoll:null,diceMult:null,
    factions:{
      blue:mkF('blue','自由陣營'),
      red: mkF('red','東方陣營'),
      gold:mkF('gold','中立陣營'),
    },
    nodes:JSON.parse(JSON.stringify(NODE_INIT)),
    crisisDeck:shuffle([...CRISIS_CARDS]),
  };
  ['blue','red','gold'].forEach(f=>{
    G.factions[f].pmDeck=shuffle([...DECKS[f].pm]);
    G.factions[f].dmDeck=shuffle([...DECKS[f].dm]);
  });
  doDraw();
  log('遊戲開始！亞太局勢一觸即發。');
  render();
}

function mkF(id,name){
  return {id,name,eco:30,mil:30,dip:30,soc:100,
    pmHand:[],dmHand:[],pmDrawn:null,dmDrawn:null,
    pmDeck:[],dmDeck:[],tradePacts:[],milPact:null,
    collapsed:false,collapseLeft:0};
}

function log(msg){G.log.unshift(`[R${G.round}] ${msg}`);if(G.log.length>25)G.log.pop()}

// ═══ CORE LOGIC ═══
function setStat(fid,s,delta){
  const f=G.factions[fid];
  f[s]=Math.max(0,f[s]+delta);
  if(s==='soc')f[s]=Math.min(100,f[s]);
  if(s==='soc'&&f[s]<=0&&!f.collapsed)doCollapse(fid);
}

function doCollapse(fid){
  const f=G.factions[fid];
  f.collapsed=true;f.collapseLeft=2;
  f.tradePacts=[];f.milPact=null;
  Object.values(G.factions).forEach(o=>{ o.tradePacts=o.tradePacts.filter(x=>x!==fid); });
  log(`⚠️ ${f.name} 政權崩潰！停止行動 2 回合。`);
  const col=Object.values(G.factions).filter(f=>f.collapsed);
  if(col.length>=2){
    if(!G.factions.gold.collapsed) endGame('gold','混亂結局','其他兩陣營相繼崩潰，中立陣營以倖存者姿態取得勝利。');
    else endGame(null,'混亂結局','三大陣營均陷入崩潰，亞太秩序全面瓦解。本局平局。');
  }
}

function resolveCard(card,fid,mult){
  const effs=[];
  card.fx.forEach(eff=>{
    const targets=eff.t==='all'?['blue','red','gold']:eff.t==='self'?[fid]:[eff.t];
    const val=eff.m?eff.v*mult:eff.v;
    targets.forEach(tid=>{
      setStat(tid,eff.s,val);
      effs.push({fid:tid,s:eff.s,v:val});
    });
  });
  (card.sfx||[]).forEach(sfx=>{
    setStat(fid,sfx.s,sfx.v);
    effs.push({fid,s:sfx.s,v:sfx.v,side:true});
  });
  if(card.ten){G.tension=clamp(G.tension+card.ten,0,10);effs.push({ten:card.ten});}
  return effs;
}

function collectNodeBonus(fid){
  const f=G.factions[fid];
  let lines=[];
  Object.entries(G.nodes).forEach(([nid,n])=>{
    if(n.owner===fid){
      Object.entries(n.bonuses).forEach(([s,v])=>{
        setStat(fid,s,v);
        lines.push(`${n.name}→${s.toUpperCase()}+${v}`);
      });
    }
  });
  f.tradePacts.forEach(pid=>{
    setStat(fid,'eco',8);
    lines.push(`貿易(${fn(pid)})→ECO+8`);
  });
  if(lines.length) log(`${f.name} 節點收益：${lines.join('，')}`);
}

function execAction(aId,target){
  const fid=activeFid();const f=G.factions[fid];
  if(aId==='aid'){
    if(f.eco<10){alert('經濟點數不足（需 10）');return false}
    setStat(fid,'eco',-10);setStat(target,'eco',10);
    log(`${f.name} 援助 ${fn(target)} ECO+10`);
  } else if(aId==='trade'){
    if(!f.tradePacts.includes(target)){
      f.tradePacts.push(target);G.factions[target].tradePacts.push(fid);
      G.tension=clamp(G.tension-1,0,10);
      log(`${f.name} 與 ${fn(target)} 達成貿易協定（每回合各 ECO+8，緊張值-1）`);
    }
  } else if(aId==='sanction'){
    if(f.dip<10){alert('外交點數不足（需 10）');return false}
    setStat(fid,'dip',-10);
    const val=f.dip>=G.factions[target].dip?-15:-8;
    setStat(target,'eco',val);G.tension=clamp(G.tension+1,0,10);
    log(`${f.name} 制裁 ${fn(target)} ECO${val}，緊張值+1`);
  } else if(aId==='milpact'){
    if(f.dip<15){alert('外交點數不足（需 15）');return false}
    setStat(fid,'dip',-15);f.milPact=target;
    G.tension=clamp(G.tension-1,0,10);
    log(`${f.name} 與 ${fn(target)} 締結軍事同盟，緊張值-1`);
  } else if(aId==='intel'){
    if(f.mil<10){alert('軍事點數不足（需 10）');return false}
    const tf=G.factions[target];
    if(f.mil<=tf.mil){alert('軍事值需高於目標陣營');return false}
    setStat(fid,'mil',-10);
    const hand=[...tf.pmHand,...tf.dmHand].filter(Boolean);
    if(hand.length>0){
      const stolen=hand[Math.floor(Math.random()*hand.length)];
      tf.pmHand=tf.pmHand.filter(c=>c.id!==stolen.id);
      tf.dmHand=tf.dmHand.filter(c=>c.id!==stolen.id);
      if(f.pmHand.length<1)f.pmHand.push(stolen);
      log(`${f.name} 從 ${fn(target)} 竊取：「${stolen.name}」，緊張值+1`);
    } else {
      log(`${f.name} 嘗試情報戰，但 ${fn(target)} 無可竊取的手牌。`);
    }
    G.tension=clamp(G.tension+1,0,10);
  } else if(aId==='media'){
    if(f.dip<12){alert('外交點數不足（需 12）');return false}
    setStat(fid,'dip',-12);setStat(target,'soc',-10);
    log(`${f.name} 媒體攻勢 → ${fn(target)} SOC-10`);
  } else if(aId==='discard'){
    f.pmHand=[];f.dmHand=[];
    ensureDeck(fid,'pm');ensureDeck(fid,'dm');
    const np=f.pmDeck.shift();const nd=f.dmDeck.shift();
    if(np)f.pmHand.push(np);if(nd)f.dmHand.push(nd);
    log(`${f.name} 弃牌刷新手牌`);
  } else if(aId==='node'){
    if(f.dip<20){alert('外交點數不足（需 20）');return false}
    setStat(fid,'dip',-20);
    const n=G.nodes[target];const prev=n.owner;
    n.owner=fid;
    if(target==='taiwan'&&prev!==fid){
      G.tension=clamp(G.tension+2,0,10);
      log(`⚡ ${f.name} 取得台灣節點！緊張值+2`);
    } else {
      log(`${f.name} 取得 ${n.name} 節點控制（DIP-20）`);
    }
  }
  G.actionDone=true;
  checkVictory();
  return true;
}

function checkVictory(){
  if(G.winner)return;
  const ids=['blue','red','gold'];
  for(const fid of ids){
    const f=G.factions[fid];
    const others=ids.filter(x=>x!==fid).map(x=>G.factions[x]);
    const tot=f.eco+f.mil+f.dip+f.soc;
    const ot=others.reduce((s,o)=>s+o.eco+o.mil+o.dip+o.soc,0);
    if(tot>=400&&ot<200){endGame(fid,'霸權結局（Hegemony）',`${f.name}四項點數總和 ${Math.round(tot)}，確立亞太霸主地位！`);return;}
    if(f.eco>=200&&others.every(o=>o.eco<80)){endGame(fid,'經濟霸主',`${f.name}以 ECO ${Math.round(f.eco)} 主宰亞太供應鏈！`);return;}
    const pacts=(f.tradePacts?.length||0)+(f.milPact?1:0);
    if(pacts>=5&&f.dip>=150){endGame(fid,'外交勝利',`${f.name}廣結盟邦（${pacts}份協定），主導多邊秩序！`);return;}
  }
  if(G.round>G.maxRounds){
    const ranked=ids.map(f=>({id:f,t:G.factions[f].eco+G.factions[f].mil+G.factions[f].dip+G.factions[f].soc})).sort((a,b)=>b.t-a.t);
    const win=ranked[0];
    endGame(win.id,'時限結局（20回合）',`${G.factions[win.id].name}以總點數 ${Math.round(win.t)} 勝出！`);
  }
}

function processHotWar(){
  if(G.tension<10)return;
  const ids=['blue','red','gold'].filter(f=>!G.factions[f].collapsed);
  if(ids.length<2)return;
  ids.forEach(fid=>{setStat(fid,'eco',-5);setStat(fid,'soc',-3);});
  const ranked=ids.sort((a,b)=>G.factions[b].mil-G.factions[a].mil);
  const str=ranked[0],wk=ranked[ranked.length-1];
  if(G.factions[str].mil-G.factions[wk].mil>=50){
    setStat(wk,'soc',-5);
    log(`⚔️ 熱戰：${G.factions[wk].name}軍事劣勢遭額外損傷`);
    if(G.factions[wk].soc<=0&&G.factions[str].mil>=250)
      endGame(str,'軍事制霸（Military Conquest）',`${G.factions[str].name}以壓倒性武力擊潰敵方！`);
  } else {
    log('⚔️ 熱戰持續！全陣營承受戰爭消耗（ECO-5, SOC-3）');
  }
  checkVictory();
}

function endGame(wid,type,desc){
  if(G.winner!==null&&G.winner!==undefined)return;
  G.winner=wid||'draw';G.ending={type,desc};
  log(`🏆 ${type}`);render();
}

function ensureDeck(fid,role){
  const f=G.factions[fid];
  const dk=role+'Deck';
  if(f[dk].length===0){
    f[dk]=shuffle([...DECKS[fid][role]]);
    log(`${f.name} ${role==='pm'?'總理':'國防'}牌組補充重洗`);
  }
}

function doDraw(){
  const fid=activeFid();const f=G.factions[fid];
  ensureDeck(fid,'pm');ensureDeck(fid,'dm');
  f.pmDrawn=f.pmDeck.shift();
  f.dmDrawn=f.dmDeck.shift();
}

function advanceTurn(){
  G.turnIdx=(G.turnIdx+1)%3;
  if(G.turnIdx===0){
    G.round++;
    G.crisisTimer--;
    if(G.crisisTimer<=0){G.crisisTimer=3;triggerCrisis();}
    processHotWar();
    checkVictory();
    if(G.winner)return;
  }
  if(G.round>G.maxRounds){checkVictory();if(G.winner)return;}
  startNextTurn();
}

function startNextTurn(){
  const fid=activeFid();const f=G.factions[fid];
  G.selPM=null;G.selDM=null;G.diceRoll=null;G.diceMult=null;
  G.pendingEffects=[];G.actionDone=false;G.selAction=null;G.phase='select';
  if(f.collapsed){
    f.collapseLeft--;
    if(f.collapseLeft<=0){
      f.collapsed=false;f.soc=20;
      log(`${f.name}從崩潰中恢復，以 SOC 20 重啟`);
    } else {
      log(`${f.name}崩潰中（剩 ${f.collapseLeft} 回合），跳過`);
      advanceTurn();return;
    }
  }
  doDraw();
  log(`${f.name} 開始行動（第 ${G.round} 回合）`);
  render();
}

function triggerCrisis(){
  if(G.crisisDeck.length===0)G.crisisDeck=shuffle([...CRISIS_CARDS]);
  const c=G.crisisDeck.shift();
  log(`🚨 全球危機：${c.name}`);
  resolveCard(c,'all',1);
  log(c.flv);
  checkVictory();
}

function applyResolution(){
  const fid=activeFid();const mult=G.diceMult||1;
  G.pendingEffects=[];
  if(G.selPM){
    const effs=resolveCard(G.selPM,fid,mult);
    G.pendingEffects.push(...effs);
    log(`${G.factions[fid].name} 打出「${G.selPM.name}」${G.selPM.dice?`(骰${G.diceRoll}×${mult})`:''}`)
  }
  if(G.selDM){
    const effs=resolveCard(G.selDM,fid,mult);
    G.pendingEffects.push(...effs);
    if(!G.selPM) log(`${G.factions[fid].name} 打出「${G.selDM.name}」${G.selDM.dice?`(骰${G.diceRoll}×${mult})`:''}`)
    else log(`→ 國防部長打出「${G.selDM.name}」`);
  }
  checkVictory();
}

function renderStats(){

    const f=G.factions[fid];const col=fc(fid);
    const ownedNodes=Object.entries(G.nodes).filter(([,n])=>n.owner===fid).map(([,n])=>n.name);
    const badges=[];
    if(f.collapsed)badges.push(`<span class="sbadge sb-col">崩潰</span>`);
    if(f.tradePacts.length)badges.push(`<span class="sbadge sb-tr">貿易×${f.tradePacts.length}</span>`);
    if(G.tension>=10)badges.push(`<span class="sbadge sb-war">熱戰</span>`);
    return `<div class="fsc" style="border-top-color:${col}">
      <div class="fsc-name" style="color:${col}">${f.name} ${badges.join('')}</div>

      <div class="stat-row"><span class="stat-lbl">⚔ 軍事</span><span class="stat-v" style="color:#d97070">${Math.round(f.mil)}</span></div>

function renderCard(card,role,selected,played){
  const fid=activeFid();const col=fc(fid);
  const tlabels={h:'歷史',f:'自訂',a:'行動',c:'危機',crisis:'危機'};
  const tcolors={h:'#6b9adf',f:'#9b73cc',a:'#5bab7c',c:'#d97070',crisis:'#d97070'};
  const rl=role==='pm'?'總理':'國防';
  const effsH=card.fx.map(e=>{
    const tl=e.t==='self'?'己方':e.t==='all'?'全陣':fn(e.t);
    const sl=stat_lbl(e.s);const sign=e.v>0?'+':'';
    const ml=e.m?' ×骰':'（固）';
    return `<div class="ceff${e.v<0?' neg':''}">${tl} ${sl}${sign}${e.v}${ml}</div>`;
  }).join('');
  const sfxH=(card.sfx||[]).map(s=>{
    return `<div class="ceff neg">${stat_lbl(s.s)}${s.v}（副作用）</div>`;
  }).join('');
  const cls=`gcard${selected?' sel':''}${played?' played':''}`;
  const onclick=played?'':`onclick="handleCardSel('${role}','${card.id}')"`;
  return `<div class="${cls}" ${onclick} style="${selected?`border-color:${col}`:''}">
    <div class="ctag" style="color:${tcolors[card.type]}">${rl} · ${tlabels[card.type]}</div>
    <div class="cname">${card.name}</div>
    ${effsH}${sfxH}
    ${card.flv?`<div class="cflv">${card.flv}</div>`:''}
  </div>`;
}

function renderCenter(){
  const fid=activeFid();const f=G.factions[fid];const col=fc(fid);
  if(G.phase==='select') return renderSelectPhase(fid,f,col);
  if(G.phase==='resolve') return renderResolvePhase(fid,f,col);
  if(G.phase==='action') return renderActionPhase(fid,f,col);
  return '';
}

function renderSelectPhase(fid,f,col){
  const pmCards=[...f.pmHand,f.pmDrawn].filter(Boolean);
  const dmCards=[...f.dmHand,f.dmDrawn].filter(Boolean);
  const pmH=pmCards.map(c=>renderCard(c,'pm',G.selPM?.id===c.id,false)).join('');
  const dmH=dmCards.map(c=>renderCard(c,'dm',G.selDM?.id===c.id,false)).join('');
  const canGo=G.selPM||G.selDM;
  return `<div class="ptitle" style="color:${col}">▶ 選牌階段 — ${f.name}</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px">選擇要打出的牌（PM 和 DM 各選最多 1 張，未選的牌留存手牌下回合使用）</div>
    <div class="div-lbl">總理牌組（PM）</div>
    <div class="cards-row">${pmH||'<span style="color:var(--dim);font-size:11px">無可用牌</span>'}</div>
    <div class="div-lbl" style="margin-top:12px">國防部長牌組（DM）</div>
    <div class="cards-row">${dmH||'<span style="color:var(--dim);font-size:11px">無可用牌</span>'}</div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-b" ${!canGo?'disabled':''} onclick="handleGoResolve()">結算選中的牌 →</button>
      <button class="btn" onclick="handleSkipToAction()">跳過出牌（直接行動）</button>
    </div>`;
}

function renderResolvePhase(fid,f,col){
  const needDice=(G.selPM?.dice)||(G.selDM?.dice);
  const rolled=G.diceRoll!==null;
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  const pmH=G.selPM?renderCard(G.selPM,'pm',false,true):'';
  const dmH=G.selDM?renderCard(G.selDM,'dm',false,true):'';
  const effH=G.pendingEffects.length?`<div class="elog">
    <div style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-bottom:5px">結算結果</div>
    ${G.pendingEffects.map(e=>{
      if(e.ten) return `<div>緊張值 <span class="${e.ten>0?'el-minus':'el-plus'}">${e.ten>0?'+':''}${e.ten}</span></div>`;
      const fn2=G.factions[e.fid]?.name||e.fid;
      const sign=e.v>0?'+':'';
      const cls=e.v>0?'el-plus':'el-minus';
      return `<div>${fn2} ${stat_lbl(e.s)} <span class="${cls}">${sign}${Math.round(e.v)}</span>${e.side?' (副作用)':''}</div>`;
    }).join('')}
  </div>`:'';
  return `<div class="ptitle" style="color:${col}">▶ 結算階段 — ${f.name}</div>
    <div class="cards-row" style="margin-bottom:12px">${pmH}${dmH}</div>
    ${needDice&&!rolled?`<div class="dice-box" style="margin-bottom:12px">
      <span class="dface" id="dface">🎲</span>
      <div style="font-size:11px;color:var(--dim);margin:6px 0">點擊擲骰決定事件倍數</div>
      <button class="btn btn-g" onclick="handleRoll()">擲骰！</button>
    </div>`:''}
    ${rolled&&needDice?`<div class="dice-box" style="margin-bottom:12px">
      <span class="dface">${faces[G.diceRoll-1]}</span>
      <div class="dmult">× ${G.diceMult}</div>
    </div>`:''}
    ${effH}
    ${rolled||!needDice?`<button class="btn btn-b" onclick="handleConfirmResolve()">確認結算，進入行動階段 →</button>`:''}`;
}

function renderActionPhase(fid,f,col){
  const others=['blue','red','gold'].filter(x=>x!==fid);
  const fOpts=others.map(x=>`<option value="${x}">${G.factions[x].name}</option>`).join('');
  const nOpts=Object.entries(G.nodes).filter(([,n])=>n.owner!==fid)
    .map(([id,n])=>`<option value="${id}">${n.name}（${fn(n.owner)}）</option>`).join('');
  const actions=[
    {id:'aid',    t:'援助（Aid）',       c:'消耗 ECO -10',    d:'轉移 ECO +10 給目標陣營',hasTarget:'faction'},
    {id:'trade',  t:'貿易協定',          c:'免費',            d:'雙方每回合 ECO +8，緊張值-1',hasTarget:'faction'},
    {id:'sanction',t:'制裁（Sanction）', c:'消耗 DIP -10',    d:'目標 ECO -15，緊張值+1',hasTarget:'faction'},
    {id:'milpact',t:'軍事同盟',          c:'消耗 DIP -15',    d:'合併計算軍事點數，緊張值-1',hasTarget:'faction'},
    {id:'intel',  t:'情報戰',            c:'消耗 MIL -10',    d:'竊取對手手牌，緊張值+1',hasTarget:'faction'},
    {id:'media',  t:'媒體攻勢',          c:'消耗 DIP -12',    d:'目標陣營 SOC -10',hasTarget:'faction'},
    {id:'discard',t:'弃牌（Discard）',   c:'免費',            d:'清空手牌重新抽牌',hasTarget:null},
    {id:'node',   t:'外交爭奪節點',      c:'消耗 DIP -20',    d:'取得地圖節點控制',hasTarget:'node'},
  ];
  const done=G.actionDone;
  const aHTML=actions.map(a=>`
    <div class="abtn" ${done?'disabled':''} onclick="handleActSel('${a.id}')">
      <div class="atitle" style="${G.selAction===a.id?`color:var(--accent)`:''}">${a.t}</div>
      <div class="acost">${a.c}</div>
      <div class="adesc">${a.d}</div>

  const targetUI=G.selAction&&selA&&!done?`
    <div class="panel" style="margin-top:8px">
      <div class="ptitle">選擇目標</div>
      ${selA.hasTarget==='faction'?`<select id="tsel" style="margin-bottom:8px">${fOpts}</select>`:
        selA.hasTarget==='node'?`<select id="tsel" style="margin-bottom:8px">${nOpts}</select>`:
        '<div style="color:var(--dim);font-size:11px;margin-bottom:8px">無需選擇目標</div>'}
      <button class="btn btn-g" onclick="handleConfirmAction()">確認執行</button>
    </div>`:
    (G.selAction&&!selA?.hasTarget&&!done)?`<div style="margin-top:8px"><button class="btn btn-g" onclick="handleConfirmAction()">確認執行 ${selA?.t}</button></div>`:'';
  return `<div class="ptitle" style="color:${col}">▶ 陣營行動 — ${f.name}</div>
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px">${done?'✓ 本回合行動已完成':'選擇一種行動，或跳過'}</div>
    <div class="agrid">${aHTML}</div>
    ${targetUI}
    <div class="btn-row" style="margin-top:12px">
      ${!done?`<button class="btn" onclick="handleSkipAction()">跳過行動</button>`:''}
      <button class="btn btn-b" onclick="handleEndTurn()">結束回合 →</button>
    </div>`;
}

      </div>

    </div>
  </div>`;

// ═══ HANDLERS ═══
function handleCardSel(role,cardId){
  const fid=activeFid();const f=G.factions[fid];
  if(role==='pm'){
    const all=[...f.pmHand,f.pmDrawn].filter(Boolean);
    const c=all.find(x=>x.id===cardId);
    G.selPM=G.selPM?.id===cardId?null:c;
  } else {
    const all=[...f.dmHand,f.dmDrawn].filter(Boolean);
    const c=all.find(x=>x.id===cardId);
    G.selDM=G.selDM?.id===cardId?null:c;
  }
  render();
}

function handleGoResolve(){
  if(!G.selPM&&!G.selDM)return;
  G.phase='resolve';
  const needDice=(G.selPM?.dice)||(G.selDM?.dice);
  if(!needDice){
    G.diceRoll=1;G.diceMult=1;
    applyResolution();
  }
  render();
}

function handleSkipToAction(){
  const fid=activeFid();const f=G.factions[fid];
  if(f.pmDrawn&&f.pmHand.length<1)f.pmHand.push(f.pmDrawn);
  if(f.dmDrawn&&f.dmHand.length<1)f.dmHand.push(f.dmDrawn);
  f.pmDrawn=null;f.dmDrawn=null;
  G.phase='action';render();
}

function handleRoll(){
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  const finalRoll=Math.floor(Math.random()*6)+1;
  const face=document.getElementById('dface');
  if(!face){
    G.diceRoll=finalRoll;G.diceMult=getDiceMult(finalRoll);
    applyResolution();render();return;
  }
  let count=0;
  const anim=setInterval(()=>{
    face.textContent=faces[Math.floor(Math.random()*6)];
    count++;
    if(count>=10){
      clearInterval(anim);
      face.textContent=faces[finalRoll-1];
      G.diceRoll=finalRoll;G.diceMult=getDiceMult(finalRoll);
      applyResolution();
      setTimeout(()=>render(),400);
    }
  },80);
}

function handleConfirmResolve(){
  const fid=activeFid();const f=G.factions[fid];
  if(G.selPM){
    f.pmHand=f.pmHand.filter(c=>c.id!==G.selPM.id);
    if(f.pmDrawn&&f.pmDrawn.id!==G.selPM.id&&f.pmHand.length<1)f.pmHand.push(f.pmDrawn);
  } else if(f.pmDrawn&&f.pmHand.length<1) f.pmHand.push(f.pmDrawn);
  f.pmDrawn=null;
  if(G.selDM){
    f.dmHand=f.dmHand.filter(c=>c.id!==G.selDM.id);
    if(f.dmDrawn&&f.dmDrawn.id!==G.selDM.id&&f.dmHand.length<1)f.dmHand.push(f.dmDrawn);
  } else if(f.dmDrawn&&f.dmHand.length<1) f.dmHand.push(f.dmDrawn);
  f.dmDrawn=null;
  collectNodeBonus(fid);
  G.phase='action';render();
}

function handleActSel(aId){if(!G.actionDone){G.selAction=aId;render();}}
function handleConfirmAction(){
  const selA=['aid','trade','sanction','milpact','intel','media','discard','node']
    .find(x=>x===G.selAction);
  if(!selA)return;
  const needsFaction=['aid','trade','sanction','milpact','intel','media'].includes(selA);
  const needsNode=selA==='node';
  let target=null;
  if(needsFaction||needsNode){
    const sel=document.getElementById('tsel');
    if(sel)target=sel.value;
  }
  const ok=execAction(selA,target);
  if(ok!==false){G.selAction=null;render();}
}
function handleSkipAction(){
  G.actionDone=true;
  log(`${G.factions[activeFid()].name} 跳過行動`);
  render();
}
function handleEndTurn(){
  if(G.tension>=8) log(`⚠️ 緊張值 ${G.tension}：${G.tension>=10?'熱戰狀態！':'冷戰狀態'}`);
  advanceTurn();
}
function handleNodeClick(nid){
  const n=G.nodes[nid];
  const b=Object.entries(n.bonuses).map(([s,v])=>`${stat_lbl(s)}+${v}/回`).join('，');
  log(`節點：${n.name}（${fn(n.owner)}控制）${b}`);
  render();
}

// ═══ START ═══
initGame();
</script>
